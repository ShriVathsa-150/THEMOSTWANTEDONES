<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShopSage | Smart Shopping</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">ShopSage</div>
            <button class="history-item" onclick="location.reload()" style="background: var(--glass); text-align:center;">+ New Session</button>
            <div id="history-list" style="margin-top:20px;"></div>
        </aside>
        <main class="main-content">
            <div id="chat-window" class="chat-window">
                <div id="welcome-screen" style="text-align:center; margin-top:20vh;">
                    <h1 style="font-size:3.5rem; margin-bottom:1rem;">ShopSage</h1>
                    <p style="color:var(--text-muted); font-size:1.2rem;">Your intelligent guide to the best products and prices.</p>
                </div>
            </div>
            <div class="input-section">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Search for products, compare prices..." autocomplete="off">
                    <button id="send-btn">Send</button>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
