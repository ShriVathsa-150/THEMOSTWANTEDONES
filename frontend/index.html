<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopSage - AI Shopping Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="chat-container">
        <header class="chat-header">
            <h1>🛍️ ShopSage AI</h1>
            <p>Your intelligent shopping companion</p>
        </header>

        <div id="chat-box" class="chat-box">
            <div class="message bot-message">
                Hello! I'm ShopSage. Tell me what you're looking for, and I'll find the best market picks for you.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="E.g., Suggest a gaming laptop under 80k..." autocomplete="off">
            <button id="send-btn" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
